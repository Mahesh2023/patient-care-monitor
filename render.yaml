# Render blueprint — single-service, Docker build.
# Deploy: push to GitHub → Render → New → Blueprint → pick this repo.
services:
  - type: web
    name: care-mm
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    # NOTE: Do NOT set PORT here. Render injects it automatically and the
    # Dockerfile's CMD uses ${PORT:-8000}, so it "just works" both locally
    # and on Render.
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false           # set in Render dashboard; never committed
      - key: ENABLE_LLM_REASONING
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: MODEL_DIR
        value: /app/models    # matches the Dockerfile pre-download location
